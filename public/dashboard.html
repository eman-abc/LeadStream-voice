<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dino Software — Lead Triage Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
        // Suppress Babel's standalone production warning
        const _warn = console.warn;
        console.warn = (...args) => {
            if (typeof args[0] === 'string' && args[0].includes('in-browser Babel transformer')) return;
            _warn(...args);
        };
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import Vapi from 'https://esm.sh/@vapi-ai/web@latest';
        window.Vapi = Vapi;
    </script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8e6df;
            --muted: #6b6a65;
            --accent: #5dcaa5;
            --danger: #e24b4a;
            --warning: #ef9f27;
            --info: #378add;
            --success: #639922;
            --purple: #7f77dd;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            min-height: 100vh;
        }

        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            grid-column: 1/-1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .topbar-brand {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ws-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .ws-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
        }

        .ws-dot.connected {
            background: var(--accent);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1 }
            50% { opacity: .3 }
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 16px 0;
        }

        .sidebar-section {
            padding: 8px 16px 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px 16px 16px;
        }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .stat-num {
            font-size: 24px;
            font-weight: 600;
            line-height: 1;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .stat-num.green { color: var(--accent); }
        .stat-num.red { color: var(--danger); }
        .stat-num.blue { color: var(--info); }
        .stat-num.purple { color: var(--purple); }

        .active-calls { padding: 0 16px 16px; }

        .active-call-item {
            background: var(--bg);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .active-call-id {
            font-family: monospace;
            color: var(--accent);
            font-size: 11px;
        }

        .active-call-state {
            color: var(--muted);
            margin-top: 2px;
        }

        .no-active {
            font-size: 12px;
            color: var(--muted);
            padding: 0 16px;
            font-style: italic;
        }

        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-header h2 {
            font-size: 15px;
            font-weight: 500;
        }

        .tab-row {
            display: flex;
            gap: 4px;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: all .15s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--text);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .lead-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            animation: slideIn .3s ease;
        }

        .lead-card.redlined { border-color: var(--danger); }
        .lead-card.demo { border-color: var(--accent); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lead-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar.blue { background: rgba(55, 138, 221, .2); color: var(--info); }
        .avatar.red { background: rgba(226, 75, 74, .2); color: var(--danger); }
        .avatar.green { background: rgba(93, 202, 165, .2); color: var(--accent); }

        .lead-name { font-size: 14px; font-weight: 500; }
        .lead-email { font-size: 12px; color: var(--muted); }

        .lead-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            padding: 2px 9px;
            border-radius: 20px;
            font-weight: 500;
        }

        .badge.demo { background: rgba(99, 153, 34, .2); color: var(--success); }
        .badge.pricing { background: rgba(55, 138, 221, .2); color: var(--info); }
        .badge.general { background: rgba(255, 255, 255, .07); color: var(--muted); }
        .badge.redline { background: rgba(226, 75, 74, .2); color: var(--danger); }
        .badge.unq { background: rgba(239, 159, 39, .15); color: var(--warning); }

        .lead-time { font-size: 11px; color: var(--muted); }

        .lead-summary {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            line-height: 1.6;
            font-style: italic;
        }

        .event-list {
            font-family: monospace;
            font-size: 12px;
        }

        .event-row {
            display: flex;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            align-items: flex-start;
        }

        .event-time { color: var(--muted); white-space: nowrap; }
        .event-type { font-weight: 600; min-width: 110px; }
        .event-type.CALL_STARTED { color: var(--accent); }
        .event-type.TURN { color: var(--info); }
        .event-type.REDLINE { color: var(--danger); }
        .event-type.CALL_ENDED { color: var(--purple); }

        .event-detail { opacity: .8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .call-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all .2s;
        }

        .call-btn.idle { background: rgba(93, 202, 165, .15); color: var(--accent); border: 1px solid rgba(93, 202, 165, .4); }
        .call-btn.active { background: rgba(226, 75, 74, .15); color: var(--danger); border: 1px solid rgba(226, 75, 74, .4); animation: pulse 1.5s infinite; }
        .call-btn.loading { background: rgba(239, 159, 39, .1); color: var(--warning); border: 1px solid rgba(239, 159, 39, .3); cursor: not-allowed; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(226, 75, 74, .4) }
            50% { box-shadow: 0 0 0 6px rgba(226, 75, 74, 0) }
        }

        .call-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        function timeAgo(ts) {
            const s = Math.floor((Date.now() - ts) / 1000);
            if (s < 5) return "just now";
            if (s < 60) return `${s}s ago`;
            if (s < 3600) return `${Math.floor(s / 60)}m ago`;
            return `${Math.floor(s / 3600)}h ago`;
        }

        function initials(name) {
            if (!name || name === "Unknown") return "?";
            return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
        }

        function LeadCard({ lead, ts }) {
            const [, setTick] = useState(0);
            useEffect(() => {
                const t = setInterval(() => setTick(n => n + 1), 30000);
                return () => clearInterval(t);
            }, []);

            const isDemo = lead.intent === "demo_request";
            return (
                <div className={`lead-card ${lead.redlineFlagged ? "redlined" : isDemo ? "demo" : ""}`}>
                    <div className="lead-header">
                        <div className={`avatar ${lead.redlineFlagged ? "red" : isDemo ? "green" : "blue"}`}>
                            {initials(lead.customer.name)}
                        </div>
                        <div style={{ flex: 1 }}>
                            <div className="lead-name">{lead.customer.name}</div>
                            <div className="lead-email">{lead.customer.email || "(no email)"}</div>
                        </div>
                    </div>
                    <div className="lead-footer">
                        <div className="badge-row">
                            <span className={`badge ${isDemo ? "demo" : "general"}`}>{lead.intent}</span>
                            {lead.redlineFlagged && <span className="badge redline">⚠ Redline</span>}
                        </div>
                        <div className="lead-time">{timeAgo(ts)}</div>
                    </div>
                    {lead.summary && <div className="lead-summary">"{lead.summary}"</div>}
                </div>
            );
        }

        function EventRow({ event }) {
            const detail = (() => {
                if (event.type === "CALL_STARTED") return "Call connected";
                if (event.type === "TURN") return `"${event.data.transcript || ""}"`;
                if (event.type === "CALL_ENDED") return `Lead: ${event.data.lead?.customer?.name || "?"}`;
                return JSON.stringify(event.data);
            })();
            return (
                <div className="event-row">
                    <span className="event-time">{new Date(event.ts).toLocaleTimeString()}</span>
                    <span className={`event-type ${event.type}`}>{event.type}</span>
                    <span className="event-detail">{detail}</span>
                </div>
            );
        }

        const VAPI_PUBLIC_KEY = "fe3c7477-3df4-4d92-9ce6-bb1a3b04d0c7";
        const ASSISTANT_ID = "b629145c-ca53-4024-abc5-636fa1a770b1";

        function App() {
            const [events, setEvents] = useState([]);
            const [wsStatus, setWsStatus] = useState("connecting");
            const [tab, setTab] = useState("leads");
            const [callStatus, setCallStatus] = useState("idle");
            const wsRef = useRef(null);
            const vapiRef = useRef(null);

            const leads = events.filter(e => e.type === "CALL_ENDED");
            const activeCalls = events.filter(e => e.type === "CALL_STARTED" && !events.some(x => x.type === "CALL_ENDED" && x.callId === e.callId));

            const connect = useCallback(() => {
                const ws = new WebSocket(window.location.origin.replace(/^http/, 'ws'));
                ws.onopen = () => setWsStatus("connected");
                ws.onmessage = (msg) => {
                    const data = JSON.parse(msg.data);
                    if (data.type === "HISTORY") setEvents(data.events);
                    if (data.type === "EVENT") setEvents(prev => [...prev, data.event]);
                };
                ws.onclose = () => setTimeout(connect, 3000);
                wsRef.current = ws;
            }, []);

            useEffect(() => {
                let retry = 0;
                const init = () => {
                    if (window.Vapi) {
                        const vapi = new window.Vapi(VAPI_PUBLIC_KEY);
                        vapi.on("call-start", () => setCallStatus("active"));
                        vapi.on("call-end", () => setCallStatus("idle"));
                        vapi.on("error", () => setCallStatus("idle"));
                        vapiRef.current = vapi;
                    } else if (retry < 10) {
                        retry++;
                        setTimeout(init, 500);
                    }
                };
                init();
                connect();
                return () => wsRef.current?.close();
            }, [connect]);

            const toggleCall = () => {
                if (!vapiRef.current) return;
                if (callStatus === "active") vapiRef.current.stop();
                else { setCallStatus("loading"); vapiRef.current.start(ASSISTANT_ID); }
            };

            return (
                <div className="app">
                    <div className="topbar">
                        <div className="topbar-brand">🦕 Dino — Live Dashboard</div>
                        <div className="topbar-right">
                            <button className={`call-btn ${callStatus}`} onClick={toggleCall} disabled={callStatus === "loading"}>
                                <div className="call-dot" />
                                {callStatus === "active" ? "End Call" : callStatus === "loading" ? "Connecting..." : "Talk to Alex"}
                            </button>
                            <div className="ws-badge">
                                <div className={`ws-dot ${wsStatus === "connected" ? "connected" : ""}`} />
                                {wsStatus}
                            </div>
                        </div>
                    </div>
                    <div className="sidebar">
                        <div className="sidebar-section">Stats</div>
                        <div className="stat-grid">
                            <div className="stat-card"><div className="stat-num blue">{events.length}</div><div className="stat-label">Events</div></div>
                            <div className="stat-card"><div className="stat-num green">{leads.length}</div><div className="stat-label">Leads</div></div>
                        </div>
                        <div className="sidebar-section">Active</div>
                        {activeCalls.map(c => <div key={c.callId} className="active-call-item">{c.callId.slice(0,8)}</div>)}
                    </div>
                    <div className="main">
                        <div className="main-header">
                            <div className="tab-row">
                                <button className={`tab ${tab === "leads" ? "active" : ""}`} onClick={() => setTab("leads")}>Leads</button>
                                <button className={`tab ${tab === "log" ? "active" : ""}`} onClick={() => setTab("log")}>Events</button>
                            </div>
                        </div>
                        <div className="content">
                            {tab === "leads" ? leads.map(l => <LeadCard key={l.id} lead={l.data.lead} ts={l.ts} />) : events.map(e => <EventRow key={e.id} event={e} />)}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
