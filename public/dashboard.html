<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dino Software — Lead Triage Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: rgba(255,255,255,0.08);
    --text: #e8e6df;
    --muted: #6b6a65;
    --accent: #5dcaa5;
    --danger: #e24b4a;
    --warning: #ef9f27;
    --info: #378add;
    --success: #639922;
    --purple: #7f77dd;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  
  body { background: var(--bg); color: var(--text); font-family: var(--font); 
         font-size: 14px; min-height: 100vh; }

  .app { display: grid; grid-template-columns: 280px 1fr; 
         grid-template-rows: 56px 1fr; height: 100vh; overflow: hidden; }

  /* TOP BAR */
  .topbar { grid-column: 1/-1; background: var(--surface); 
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; 
            justify-content: space-between; padding: 0 24px; }
  .topbar-brand { font-size: 15px; font-weight: 600; 
                  display: flex; align-items: center; gap: 10px; }
  .dino-icon { font-size: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .ws-badge { display: flex; align-items: center; gap: 6px; 
              font-size: 12px; color: var(--muted); }
  .ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .ws-dot.connected { background: var(--accent); 
                      animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border);
             overflow-y: auto; padding: 16px 0; }
  .sidebar-section { padding: 8px 16px 4px; font-size: 10px; 
                     text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 16px 16px; }
  .stat-card { background: var(--bg); border: 1px solid var(--border); 
               border-radius: 8px; padding: 10px 12px; }
  .stat-num { font-size: 24px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-num.green { color: var(--accent); }
  .stat-num.red { color: var(--danger); }
  .stat-num.blue { color: var(--info); }
  .stat-num.purple { color: var(--purple); }

  .active-calls { padding: 0 16px 16px; }
  .active-call-item { background: var(--bg); border: 1px solid var(--accent);
                      border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; 
                      font-size: 12px; }
  .active-call-id { font-family: monospace; color: var(--accent); font-size: 11px; }
  .active-call-state { color: var(--muted); margin-top: 2px; }
  .no-active { font-size: 12px; color: var(--muted); 
               padding: 0 16px; font-style: italic; }

  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .main-header { padding: 16px 24px; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; justify-content: space-between; }
  .main-header h2 { font-size: 15px; font-weight: 500; }
  .tab-row { display: flex; gap: 4px; }
  .tab { padding: 6px 14px; border-radius: 6px; font-size: 13px;
         cursor: pointer; border: none; background: transparent; 
         color: var(--muted); transition: all .15s; }
  .tab.active { background: var(--surface); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* LEAD CARDS */
  .lead-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: 10px; padding: 16px; margin-bottom: 12px;
               animation: slideIn .3s ease; }
  .lead-card.redlined { border-color: var(--danger); }
  .lead-card.demo { border-color: var(--accent); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .lead-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 13px; 
            font-weight: 600; flex-shrink: 0; }
  .avatar.blue { background: rgba(55,138,221,.2); color: var(--info); }
  .avatar.red  { background: rgba(226,75,74,.2); color: var(--danger); }
  .avatar.green{ background: rgba(93,202,165,.2); color: var(--accent); }
  .lead-name { font-size: 14px; font-weight: 500; }
  .lead-email { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .lead-footer { display: flex; align-items: center; justify-content: space-between; }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }
  .badge.demo    { background: rgba(99,153,34,.2); color: var(--success); }
  .badge.pricing { background: rgba(55,138,221,.2); color: var(--info); }
  .badge.general { background: rgba(255,255,255,.07); color: var(--muted); }
  .badge.redline { background: rgba(226,75,74,.2); color: var(--danger); }
  .badge.unq     { background: rgba(239,159,39,.15); color: var(--warning); }
  .lead-time { font-size: 11px; color: var(--muted); }
  .lead-summary { font-size: 12px; color: var(--muted); margin-top: 8px; 
                  padding-top: 8px; border-top: 1px solid var(--border);
                  line-height: 1.6; font-style: italic; }
  .call-id-row { font-size: 11px; color: var(--muted); 
                 font-family: monospace; margin-top: 4px; }

  /* EVENT LOG */
  .event-list { font-family: monospace; font-size: 12px; }
  .event-row { display: flex; gap: 12px; padding: 6px 0; 
               border-bottom: 1px solid var(--border); align-items: flex-start; }
  .event-time { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .event-type { font-weight: 600; white-space: nowrap; flex-shrink: 0; min-width: 110px; }
  .event-type.CALL_STARTED { color: var(--accent); }
  .event-type.TURN          { color: var(--info); }
  .event-type.REDLINE       { color: var(--danger); }
  .event-type.CALL_ENDED    { color: var(--purple); }
  .event-callid { color: var(--muted); flex-shrink: 0; }
  .event-detail { color: var(--text); opacity: .8; overflow: hidden; 
                  text-overflow: ellipsis; white-space: nowrap; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .clear-btn { background: var(--surface); border: 1px solid var(--border); 
               color: var(--muted); padding: 6px 14px; border-radius: 6px;
               font-size: 12px; cursor: pointer; transition: all .15s; }
  .clear-btn:hover { color: var(--text); border-color: var(--muted); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 5)  return "just now";
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    return `${Math.floor(s/3600)}h ago`;
}

function initials(name) {
    if (!name || name === "Unknown") return "?";
    return name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();
}

function avatarColor(lead) {
    if (lead.redlineFlagged) return "red";
    if (lead.intent === "demo_request") return "green";
    return "blue";
}

function intentBadge(intent) {
    const map = {
        demo_request:    ["demo",    "Demo"],
        pricing_inquiry: ["pricing", "Pricing"],
        general_inquiry: ["general", "General"],
        unqualified:     ["unq",     "Unqualified"],
    };
    const [cls, label] = map[intent] || ["general", intent];
    return <span className={`badge ${cls}`}>{label}</span>;
}

function LeadCard({ lead, ts }) {
    const [, setTick] = useState(0);
    useEffect(() => {
        const t = setInterval(() => setTick(n => n+1), 30000);
        return () => clearInterval(t);
    }, []);

    const hasEmail = lead.customer.email && lead.customer.email.length > 0;
    const isDemo   = lead.intent === "demo_request";

    return (
        <div className={`lead-card ${lead.redlineFlagged ? "redlined" : isDemo ? "demo" : ""}`}>
            <div className="lead-header">
                <div className={`avatar ${avatarColor(lead)}`}>
                    {initials(lead.customer.name)}
                </div>
                <div style={{flex:1}}>
                    <div className="lead-name">{lead.customer.name}</div>
                    <div className="lead-email">
                        {hasEmail ? lead.customer.email : "(email not captured)"}
                    </div>
                </div>
            </div>
            <div className="lead-footer">
                <div className="badge-row">
                    {intentBadge(lead.intent)}
                    {lead.redlineFlagged && <span className="badge redline">⚠ Redline</span>}
                </div>
                <div className="lead-time">{timeAgo(ts)}</div>
            </div>
            {lead.summary && (
                <div className="lead-summary">"{lead.summary.slice(0, 140)}"</div>
            )}
            <div className="call-id-row">{lead.callId.slice(0,20)}...</div>
        </div>
    );
}

function EventRow({ event }) {
    const detail = (() => {
        if (event.type === "CALL_STARTED") return "Call connected";
        if (event.type === "TURN") return `"${(event.data.transcript||"").slice(0,60)}"`;
        if (event.type === "REDLINE") return `BLOCKED: "${(event.data.transcript||"").slice(0,50)}"`;
        if (event.type === "CALL_ENDED") return `Lead: ${event.data.lead?.customer?.name || "Unknown"} — ${event.data.lead?.intent || "?"}`;
        return JSON.stringify(event.data).slice(0,80);
    })();

    const t = new Date(event.ts);
    const timeStr = t.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});

    return (
        <div className="event-row">
            <span className="event-time">{timeStr}</span>
            <span className={`event-type ${event.type}`}>{event.type}</span>
            <span className="event-callid">{event.callId.slice(0,8)}</span>
            <span className="event-detail">{detail}</span>
        </div>
    );
}

function App() {
    const [events, setEvents]       = useState([]);
    const [wsStatus, setWsStatus]   = useState("connecting");
    const [tab, setTab]             = useState("leads");
    const wsRef                     = useRef(null);

    // Derive leads from events
    const leads = events
        .filter(e => e.type === "CALL_ENDED")
        .sort((a,b) => b.ts - a.ts);

    // Derive active calls — started but not ended
    const activeCalls = (() => {
        const started = {};
        const ended   = new Set();
        events.forEach(e => {
            if (e.type === "CALL_STARTED") started[e.callId] = e;
            if (e.type === "CALL_ENDED")   ended.add(e.callId);
        });
        return Object.values(started).filter(e => !ended.has(e.callId));
    })();

    // Current state per active call
    const callStates = (() => {
        const states = {};
        events.forEach(e => {
            if (e.type === "TURN" || e.type === "REDLINE") {
                states[e.callId] = e.data.toState || e.type;
            }
        });
        return states;
    })();

    // Stats
    const stats = {
        total:   [...new Set(events.filter(e => e.type==="CALL_STARTED").map(e=>e.callId))].length,
        leads:   leads.length,
        demos:   leads.filter(e => e.data.lead?.intent === "demo_request").length,
        redlines: events.filter(e => e.type === "REDLINE").length,
    };

    const connect = useCallback(() => {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${location.host}`);
        wsRef.current = ws;

        ws.onopen = () => {
            setWsStatus("connected");
            console.log("[WS] Connected");
        };

        ws.onmessage = (msg) => {
            try {
                const payload = JSON.parse(msg.data);
                if (payload.type === "HISTORY") {
                    setEvents(payload.events);
                } else if (payload.type === "EVENT") {
                    setEvents(prev => [...prev, payload.event]);
                }
            } catch(e) { console.error("[WS] Parse error", e); }
        };

        ws.onclose = () => {
            setWsStatus("disconnected");
            setTimeout(connect, 3000); // auto-reconnect
        };

        ws.onerror = () => {
            setWsStatus("error");
            ws.close();
        };
    }, []);

    useEffect(() => {
        connect();
        return () => wsRef.current?.close();
    }, [connect]);

    return (
        <div className="app">
            {/* TOP BAR */}
            <div className="topbar">
                <div className="topbar-brand">
                    <span className="dino-icon">🦕</span>
                    Dino Software — Live Triage Dashboard
                </div>
                <div className="topbar-right">
                    <div className="ws-badge">
                        <div className={`ws-dot ${wsStatus==="connected" ? "connected" : ""}`}/>
                        {wsStatus === "connected" ? "Live" : wsStatus}
                    </div>
                </div>
            </div>

            {/* SIDEBAR */}
            <div className="sidebar">
                <div className="sidebar-section">Overview</div>
                <div className="stat-grid">
                    <div className="stat-card">
                        <div className={`stat-num blue`}>{stats.total}</div>
                        <div className="stat-label">Total calls</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-num green">{stats.leads}</div>
                        <div className="stat-label">Leads</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-num purple">{stats.demos}</div>
                        <div className="stat-label">Demos</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-num red">{stats.redlines}</div>
                        <div className="stat-label">Redlines</div>
                    </div>
                </div>

                <div className="sidebar-section">Active calls</div>
                <div className="active-calls">
                    {activeCalls.length === 0
                        ? <div className="no-active">No active calls</div>
                        : activeCalls.map(e => (
                            <div key={e.callId} className="active-call-item">
                                <div className="active-call-id">{e.callId.slice(0,16)}...</div>
                                <div className="active-call-state">
                                    State: {callStates[e.callId] || "GREETING"}
                                </div>
                            </div>
                        ))
                    }
                </div>
            </div>

            {/* MAIN */}
            <div className="main">
                <div className="main-header">
                    <h2>
                        {tab === "leads" ? `Captured leads (${leads.length})` : `Event log (${events.length})`}
                    </h2>
                    <div className="tab-row">
                        <button className={`tab ${tab==="leads"?"active":""}`}
                                onClick={() => setTab("leads")}>Leads</button>
                        <button className={`tab ${tab==="log"?"active":""}`}
                                onClick={() => setTab("log")}>Event log</button>
                    </div>
                </div>

                <div className="content">
                    {tab === "leads" && (
                        leads.length === 0
                            ? <div className="empty-state">
                                <div className="empty-icon">📞</div>
                                <div className="empty-title">Waiting for first call</div>
                                <p>Make a call to the Evolve assistant. When it ends, the lead appears here.</p>
                              </div>
                            : leads.map(e => (
                                <LeadCard key={e.id} lead={e.data.lead} ts={e.ts} />
                              ))
                    )}

                    {tab === "log" && (
                        events.length === 0
                            ? <div className="empty-state">
                                <div className="empty-icon">📋</div>
                                <div className="empty-title">No events yet</div>
                                <p>Events stream here in real time as calls come in.</p>
                              </div>
                            : <div className="event-list">
                                {[...events].reverse().map(e => (
                                    <EventRow key={e.id} event={e} />
                                ))}
                              </div>
                    )}
                </div>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
